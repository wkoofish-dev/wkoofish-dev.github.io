<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch The Button!</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f0f0;
    margin: 0;
    overflow: hidden;
  }

  #topBar {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 10px 20px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }

  #score {
    font-size: 20px;
    margin-right: 10px;
  }

  #resetBtn {
    padding: 5px 10px;
    cursor: pointer;
  }

  #gameBtn {
    position: absolute;
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: #ff4d4d;
    color: white;
  }
</style>
</head>
<body>

<div id="topBar">
  <span id="score">Score: 0</span>
  <button id="resetBtn">Reset</button>
</div>

<button id="gameBtn">Click Me</button>

<script>
let score = 0;
const button = document.getElementById("gameBtn");
const scoreText = document.getElementById("score");
const resetBtn = document.getElementById("resetBtn");

function moveButton() {
  const padding = 80;

  const maxX = window.innerWidth - button.offsetWidth - padding;
  const maxY = window.innerHeight - button.offsetHeight - padding;

  const x = Math.random() * maxX + padding/2;
  const y = Math.random() * maxY + padding/2;

  button.style.left = x + "px";
  button.style.top = y + "px";
}

button.addEventListener("mouseenter", moveButton);

button.addEventListener("click", () => {
  score++;
  scoreText.textContent = "Score: " + score;
  moveButton();
});

resetBtn.addEventListener("click", () => {
  score = 0;
  scoreText.textContent = "Score: 0";
});

moveButton();
</script>

</body>
</html>
