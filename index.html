<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch The Button</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f2f2;
  overflow:hidden;
}

#topBar{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px 20px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
  display:flex;
  gap:10px;
  align-items:center;
}

#score{
  font-size:20px;
  font-weight:bold;
}

#reset{
  padding:6px 12px;
  cursor:pointer;
}

#gameBtn{
  position:absolute;
  padding:16px 26px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#ff4d4d;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="topBar">
  <div id="score">Score: 0</div>
  <button id="reset">Reset</button>
</div>

<button id="gameBtn">Click Me</button>

<script>

const btn = document.getElementById("gameBtn")
const scoreText = document.getElementById("score")
const resetBtn = document.getElementById("reset")

let score = 0

let x = window.innerWidth/2
let y = window.innerHeight/2

let targetX = Math.random()*window.innerWidth
let targetY = Math.random()*window.innerHeight

function newTarget(){
  targetX = Math.random()*(window.innerWidth-100)
  targetY = Math.random()*(window.innerHeight-100)
}

function animate(){

  let dx = targetX - x
  let dy = targetY - y
  let dist = Math.sqrt(dx*dx + dy*dy)

  if(dist < 5){
    newTarget()
  }

  x += dx * 0.02
  y += dy * 0.02

  btn.style.left = x + "px"
  btn.style.top = y + "px"

  requestAnimationFrame(animate)
}

btn.addEventListener("click", () => {
  score++
  scoreText.textContent = "Score: " + score
  newTarget()
})

resetBtn.addEventListener("click", () => {
  score = 0
  scoreText.textContent = "Score: 0"
})

animate()

</script>

</body>
</html>
